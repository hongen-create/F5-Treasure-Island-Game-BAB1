<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>古老宫殿的过渡长廊</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap');

        :root {
            --cyan-glow: #00e5ff;
            --torch-glow: #ff7b00;
            --stone-dark: #11151c;
            --stone-light: #2a3441;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Noto Sans SC', sans-serif;
        }

        /* Mobile Portrait Container */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 900px;
            background: linear-gradient(to bottom, #05080f, var(--stone-dark));
            overflow: hidden;
            perspective: 800px;
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.1);
        }

        /* Ambient Environment */
        #corridor-walls {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.9) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.9) 100%),
                linear-gradient(0deg, rgba(0,229,255,0.05) 0%, transparent 50%);
            z-index: 1;
        }

        .torch {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255,123,0,0.6) 0%, rgba(255,42,0,0) 70%);
            border-radius: 50%;
            top: 40%;
            z-index: 2;
            animation: flicker 2s infinite alternate;
        }
        .torch.left { left: -10px; }
        .torch.right { right: -10px; }

        @keyframes flicker {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
            75% { opacity: 0.9; transform: scale(0.95); }
        }

        /* Depth Illusion (Pseudo-3D Arches) */
        .archway {
            position: absolute;
            top: 40%;
            left: 50%;
            width: 260px;
            height: 400px;
            margin-left: -130px;
            margin-top: -200px;
            border: 25px solid var(--stone-light);
            border-bottom: none;
            border-radius: 130px 130px 0 0;
            box-shadow: 
                inset 0 0 20px rgba(0, 229, 255, 0.5), 
                0 0 30px rgba(0, 229, 255, 0.3),
                inset 0 0 5px #000;
            opacity: 0;
            transform: translateZ(-1000px);
            z-index: 0;
            display: flex;
            justify-content: center;
        }

        /* Glowing Runes on Arches */
        .archway::before {
            content: "ᚹ ᚺ  ᚱ ᛟ ᚲ ᚷ ᚹ ᚺ";
            position: absolute;
            top: -15px;
            color: var(--cyan-glow);
            font-size: 14px;
            letter-spacing: 15px;
            text-shadow: 0 0 10px var(--cyan-glow);
            opacity: 0.8;
            border-radius: 50%;
        }

        @keyframes walkForward {
            0% { transform: translateZ(-800px) scale(0.5); opacity: 0; filter: brightness(0.2); }
            30% { opacity: 1; filter: brightness(0.8); }
            80% { opacity: 1; }
            100% { transform: translateZ(400px) scale(2.5); opacity: 0; filter: brightness(1.5); }
        }

        /* Fog & Particles */
        #fog {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0, 229, 255, 0.15), transparent);
            z-index: 3;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            bottom: -10px;
            width: 3px;
            height: 3px;
            background: var(--cyan-glow);
            border-radius: 50%;
            box-shadow: 0 0 8px 2px var(--cyan-glow);
            animation: floatUp linear forwards;
            z-index: 3;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-400px) scale(0.5); opacity: 0; }
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            background: rgba(17, 21, 28, 0.85);
            border: 2px solid #334;
            border-radius: 8px;
            padding: 10px 15px;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            color: #ccc;
            font-size: 14px;
        }
        .hud-title {
            font-family: 'Cinzel', serif;
            color: #e0b0ff;
            font-size: 16px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #e0b0ff;
        }
        .hud-stats { display: flex; justify-content: space-between; font-weight: bold; }
        
        /* Quiz UI */
        #quiz-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
        }
        #quiz-layer.active {
            opacity: 1;
            pointer-events: auto;
        }

        .quiz-panel {
            width: 90%;
            background: linear-gradient(135deg, #161f2b, #0d131a);
            border: 2px solid #2a3d52;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.8);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #quiz-layer.active .quiz-panel { transform: scale(1); }

        .question-header {
            text-align: center;
            color: var(--cyan-glow);
            font-family: 'Cinzel', serif;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.3);
            padding-bottom: 10px;
        }

        .question-text {
            color: #f0f0f0;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 20px;
            text-align: justify;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: linear-gradient(to right, #1c2836, #243447);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #fff;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 14px;
            text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct {
            background: linear-gradient(to right, #18452b, #205c39);
            border-color: #00ff66;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
            color: #00ff66;
        }
        .option-btn.wrong {
            background: linear-gradient(to right, #451818, #5c2020);
            border-color: #ff3333;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
            color: #ffaa99;
        }

        /* Final Gate Transition */
        #gate-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }
        .gate-door {
            position: absolute;
            width: 50%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="%2311151c"/><path d="M50 0v100M0 50h100" stroke="%232a3441" stroke-width="2"/></svg>');
            background-size: 60px 60px;
            box-shadow: inset 0 0 50px #000;
            transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            border: 2px solid #445;
        }
        .gate-door.left { left: 0; border-right: 2px solid var(--cyan-glow); transform-origin: left; }
        .gate-door.right { right: 0; border-left: 2px solid var(--cyan-glow); transform-origin: right; }
        
        .gate-door.open.left { transform: translateX(-100%); }
        .gate-door.open.right { transform: translateX(100%); }

        .gate-center-seal {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(17, 21, 28, 0.9);
            border: 4px solid var(--cyan-glow);
            border-radius: 50%;
            z-index: 31;
            box-shadow: 0 0 40px var(--cyan-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--cyan-glow);
            font-size: 40px;
            transition: opacity 1s, transform 1s;
        }
        .gate-center-seal.break { opacity: 0; transform: scale(2); }

        .gate-glow-bg {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #ffffff 0%, var(--cyan-glow) 40%, transparent 100%);
            opacity: 0;
            z-index: 29;
            transition: opacity 2s;
        }

        /* 变动 3：自动转场全屏覆盖层 */
        #summary-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 40;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            color: white;
            padding: 20px;
        }

        /* 电影级新增动效 */
        @keyframes mentorFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }
        @keyframes pulseTransition {
            0% { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1.15); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Visual Environment -->
    <div id="corridor-walls"></div>
    <div class="torch left"></div>
    <div class="torch right"></div>
    <div id="fog"></div>
    <div id="arches-container"></div>
    <div id="particles-container"></div>

    <!-- HUD -->
    <div id="hud" style="position: absolute;">
        <div class="hud-title">远古知识长廊 (知识试炼)</div>
        <div class="hud-stats">
            <div>进度: <span id="ui-progress">1/5</span></div>
            <div>分数: <span id="ui-score">0</span></div>
        </div>
        <!-- 视觉计时器 / VISUAL TIMER -->
        <div id="visual-timer" style="display: none; position: absolute; top: 10px; right: 15px; background: rgba(17, 21, 28, 0.85); border: 1px solid var(--cyan-glow); border-radius: 12px; padding: 4px 10px; color: var(--cyan-glow); font-family: 'Cinzel', serif, monospace; font-size: 13px; font-weight: bold; box-shadow: 0 0 8px var(--cyan-glow); pointer-events: none; letter-spacing: 1px;">⏱ 00:00</div>
    </div>

    <!-- Quiz Overlay -->
    <div id="quiz-layer">
        <div class="quiz-panel">
            <div class="question-header">法阵封印 - <span id="q-number">1</span></div>
            <div class="question-text" id="q-text"></div>
            <div class="options-grid" id="q-options">
                <!-- Options injected via JS -->
            </div>
            <!-- Continue Button / 继续寻找文物/继续前进按钮 -->
            <button id="quiz-continue-btn" class="option-btn" style="display: none; margin-top: 15px; width: 100%; text-align: center; font-weight: bold; background: linear-gradient(to right, #00e5ff, #0088ff); color: #000; border-color: #fff; box-shadow: 0 0 10px rgba(0, 229, 255, 0.4); cursor: pointer;">继续前进</button>
        </div>
    </div>

    <!-- Final Cinematic Gate -->
    <div id="gate-layer">
        <div class="gate-glow-bg" id="gate-glow"></div>
        <div class="gate-door left" id="gate-left"></div>
        <div class="gate-door right" id="gate-right"></div>
        <div class="gate-center-seal" id="gate-seal">ᛟ</div>
    </div>

    <!-- 变动 3：自动过渡层，无多余按钮与双重得分信息显示 -->
    <div id="summary-layer">
        <div style="position: relative; width: 100px; height: 100px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center;">
            <div style="position: absolute; width: 75px; height: 75px; background: radial-gradient(circle, var(--cyan-glow) 0%, transparent 70%); filter: blur(8px); animation: pulseTransition 1.5s infinite alternate;"></div>
            <span style="font-size: 3rem; position: relative; z-index: 10; filter: drop-shadow(0 0 10px var(--cyan-glow));">📜</span>
        </div>
        <h1 style="font-size: 26px; color: var(--cyan-glow); margin-bottom: 12px; letter-spacing: 4px; text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);">试炼完成</h1>
        <p style="font-size: 15px; color: #a3b899; letter-spacing: 2px;">正在整理历史档案...</p>
    </div>

    <!-- 变动 2：电影级章节过渡与仪式流程容器 (完全移除了 duplicate 总结卡片和二次点击层) -->
    <div id="transit-intro-screen" style="position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, #05080f, #11151c); z-index: 300; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow: hidden; perspective: 1000px; cursor: pointer;">
        
        <!-- 场景 2 文字渐显 -->
        <div id="chapter-text-overlay" style="position: absolute; z-index: 15; color: #ffdf70; text-align: center; display: none; opacity: 0; transition: opacity 0.8s ease;">
            <h1 id="chapter-step-title" style="font-size: 24px; letter-spacing: 4px; text-shadow: 0 0 15px #ffdf70; margin-bottom: 15px;">第一阶段完成</h1>
            <p id="chapter-step-sub" style="font-size: 16px; color: #e3cfa8; letter-spacing: 2px; opacity: 0; transition: opacity 0.8s ease;">正在开启新的旅程...</p>
        </div>

        <!-- 场景 3：寻宝岛远征木门 -->
        <div id="wooden-door-wrapper" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 25; pointer-events: none; display: flex;">
            <div id="wood-left" style="width: 50%; height: 100%; background: linear-gradient(90deg, #1b110a 0%, #3a2516 60%, #1b110a 100%); border-right: 4px solid #8b6508; box-shadow: inset -15px 0 30px #000; transform: translateX(-100%); transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: flex-end; padding-right: 20px;">
                <!-- 铜质古典装饰条 -->
                <div style="width: 30px; height: 12px; background: #8b6508; border-radius: 2px; box-shadow: 0 2px 5px #000;"></div>
            </div>
            <div id="wood-right" style="width: 50%; height: 100%; background: linear-gradient(-90deg, #1b110a 0%, #3a2516 60%, #1b110a 100%); border-left: 4px solid #8b6508; box-shadow: inset 15px 0 30px #000; transform: translateX(100%); transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: flex-start; padding-left: 20px;">
                <div style="width: 30px; height: 12px; background: #8b6508; border-radius: 2px; box-shadow: 0 2px 5px #000;"></div>
            </div>
        </div>

        <!-- 场景 5 & 6：神秘石门传送门 (Stone Portal Gateway) -->
        <div id="stone-portal-container" style="position: absolute; z-index: 30; width: 280px; height: 420px; display: none; flex-direction: column; justify-content: center; align-items: center; transform: scale(0.01); filter: blur(10px); transition: transform 3s cubic-bezier(0.16, 1, 0.3, 1), filter 3s ease;">
            <!-- 远古神秘拱门框 -->
            <div id="stone-arch" style="position: absolute; width: 100%; height: 100%; border: 25px solid #2a3441; border-bottom: none; border-radius: 140px 140px 0 0; box-shadow: 0 0 35px var(--cyan-glow), inset 0 0 20px rgba(0, 229, 255, 0.5); display: flex;">
                <!-- 内部对开石门 -->
                <div id="stone-door-left" style="width: 50%; height: 100%; background: #11151c; border-right: 1px solid var(--cyan-glow); box-shadow: inset -10px 0 20px #000; transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: left;"></div>
                <div id="stone-door-right" style="width: 50%; height: 100%; background: #11151c; border-left: 1px solid var(--cyan-glow); box-shadow: inset 10px 0 20px #000; transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: right;"></div>
            </div>
            <!-- 石门中心玄奥法阵 -->
            <div id="stone-portal-seal" style="position: absolute; width: 75px; height: 75px; background: rgba(17, 21, 28, 0.95); border: 3px solid var(--cyan-glow); border-radius: 50%; box-shadow: 0 0 20px var(--cyan-glow); display: flex; justify-content: center; align-items: center; color: var(--cyan-glow); font-size: 24px; transition: opacity 0.8s, transform 0.8s; z-index: 5;">ᛟ</div>

        <!-- 场景 7 Layout: Portal remains centerpiece, Jack stands lower as a guide -->
        <div id="cinematic-hud-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 35; display: none; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 40px; pointer-events: none;">
            <!-- JACK老师 NPC -->
            <div id="intro-mentor" style="width: 100px; height: 100px; opacity: 0; transform: translateY(15px); transition: all 1s ease; margin-bottom: 10px;">
                <img src="JACK1.png" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.7)); animation: mentorFloat 4s ease-in-out infinite alternate;" />

                <div style="font-size: 11px; color: #ffd700; letter-spacing: 2px; margin-bottom: 3px;">历史守护者联盟导师</div>
                <div style="font-size: 16px; color: #ffffff; font-weight: bold; letter-spacing: 3px;">万能教·JACK老师</div>
            </div>

            <!-- 独立对白板 -->
            <div id="intro-dialogue-box" style="width: 86%; min-height: 85px; background: rgba(12, 18, 26, 0.92); border: 1px solid rgba(0, 229, 255, 0.35); padding: 14px; border-radius: 6px; font-size: 13px; line-height: 1.5; color: #e2d7c5; text-align: center; letter-spacing: 1.5px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; pointer-events: auto;"></div>
            
            <button id="btn-intro-ready" class="action-btn" style="pointer-events: auto; display: none; margin-top: 0; padding: 12px 42px; font-size: 15px; background: linear-gradient(to bottom, #00e5ff, #0088ff); border: 2px solid #ffffff; border-radius: 30px; color: #000; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 229, 255, 0.4);">准备好了</button>
        </div>

        <!-- 场景 8 激活通知 -->
        <div id="intro-door-open-text" style="position: absolute; z-index: 40; color: var(--cyan-glow); font-size: 20px; letter-spacing: 3px; text-shadow: 0 0 15px var(--cyan-glow); display: none; opacity: 0; transition: opacity 0.5s;">知识长廊已开启</div>
    </div>
</div>

<script>
    /* ==========================================
       STORAGE FOUNDATION DRIVERS
       ========================================== */
    const SESSION_KEY = 'sovereigns_relic_session';
    let transitStartTime = 0;

    // --- CINEMATIC SKIP STATE & TIMEOUT MANAGEMENT ---
    let cinematicSkipped = false;
    let dialogueStarted = false;
    let cinematicTimeouts = [];

    function addCinematicTimeout(fn, delay) {
        const id = setTimeout(fn, delay);
        cinematicTimeouts.push(id);
        return id;
    }

    function clearCinematicTimeouts() {
        cinematicTimeouts.forEach(clearTimeout);
        cinematicTimeouts = [];
    }

    function generateAttemptId() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const dateStr = `${yyyy}${mm}${dd}`;
                
        return `HIS-${dateStr}-${Date.now()}`;
    }

    function createDefaultSession() {
        return {
            attemptId: generateAttemptId(),
            date: new Date().toISOString(),
            completedStatus: false,
            level1Score: 0,
            level1Time: 0,
            level1TimeSeconds: 0,
            level1TimeDisplay: "",
            transitScore: 0,
            transitTime: 0,
            transitTimeSeconds: 0,
            transitTimeDisplay: "",
            level2Score: 0,
            level2Time: 0,
            totalTime: 0,
            q1_q5_answers: [
                { "questionId": "Q1", "answer": "" },
                { "questionId": "Q2", "answer": "" },
                { "questionId": "Q3", "answer": "" },
                { "questionId": "Q4", "answer": "" },
                { "questionId": "Q5", "answer": "" }
            ],
            learningType: '',
            name: '',
            phone: '',
            email: ''
        };
    }

    function initializeGameSession() {
        let session = localStorage.getItem(SESSION_KEY);
        if (!session) {
            const defaultSession = createDefaultSession();
            localStorage.setItem(SESSION_KEY, JSON.stringify(defaultSession));
            return defaultSession;
        }
        return JSON.parse(session);
    }

    function saveGameSession(sessionData) {
        localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
    }

    function loadGameSession() {
        const session = localStorage.getItem(SESSION_KEY);
        return session ? JSON.parse(session) : initializeGameSession();
    }

    function resetGameSession() {
        const newSession = createDefaultSession();
        localStorage.setItem(SESSION_KEY, JSON.stringify(newSession));
        return newSession;
    }

    // --- EDUCATIONAL CONTENT DATA ---
    const questions = [
        {
            q: "Apakah ciri-ciri kedaulatan tradisional?<br><br>I Wujud sejak tamadun awal manusia<br>II Pemerintahan berkuasa mutlak<br>III Dikaitkan dengan hak rakyat and kerajaan<br>IV Mengamalkan sistem Demokrasi Berparlimen",
            options: ["A. I dan II", "B. I dan IV", "C. II dan III", "D. III dan IV"],
            correct: 0
        },
        {
            q: "Kedaulatan undang-undang mewujudkan keamanan, kestabilan, dan kemakmuran di negara kita.<br>Mengapakah halnya demikian?",
            options: ["A. Tidak meminda perlembagaan", "B. Merujuk Hukum Kanun Melaka", "C. Melaksanakan undang-undang moden", "D. Wujudnya badan kehakiman yang bebas"],
            correct: 3
        },
        {
            q: "Apakah matlamat utama usaha kerajaan tersebut?",
            options: ["A. Memajukan bidang ekonomi", "B. Memupuk perpaduan rakyat", "C. Menyekat kedatangan imigran", "D. Menyalurkan bantuan kewangan"],
            correct: 1
        },
        {
            q: "Apakah kuasa yang terlibat dalam melaksanakan dasar pentadbiran negara?<br><br>I Badan Berkanun<br>II Jemaah Menteri<br>III Kementerian berkaitan<br>IV Pihak berkuasa tempatan",
            options: ["A. I dan II", "B. I dan IV", "C. II dan III", "D. III dan IV"],
            correct: 2
        },
        {
            q: "Kedaulatan memberikan hak kepada Malaysia untuk menggubal dasar luar tanpa pengaruh mana-mana pihak.<br>Apakah kepentingan negara menggubal dasar luar?<br><br>I Menjalin persahabatan<br>II Mewujudkan kerjasama<br>III Memperkasa angkatan pertahanan<br>IV Mengukuhkan kedudukan kerajaan",
            options: ["A. I dan II", "B. I dan IV", "C. II dan III", "D. III dan IV"],
            correct: 0
        }
    ];

    // --- GAME STATE ---
    let currentIndex = 0;
    let totalCorrect = 0;
    let totalWrong = 0;
    let totalScore = 0;
    let walkingInterval = null;
    let particleInterval = null;
    let isAnswering = false;

    // --- DOM ELEMENTS ---
    const archesContainer = document.getElementById('arches-container');
    const particlesContainer = document.getElementById('particles-container');
    const quizLayer = document.getElementById('quiz-layer');
    const uiProgress = document.getElementById('ui-progress');
    const uiScore = document.getElementById('ui-score');
    const qNumber = document.getElementById('q-number');
    const qText = document.getElementById('q-text');
    const qOptions = document.getElementById('q-options');
    const corridorWalls = document.getElementById('corridor-walls');

    // --- QoL: VISUAL TIMER CONTROLLER ---
    let timerInterval;
    function startVisualTimer() {
        const timerEl = document.getElementById('visual-timer');
        if (!timerEl) return;
        timerEl.style.display = 'block';
        
        if (timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if (!transitStartTime) return;
            const elapsed = Math.round((Date.now() - transitStartTime) / 1000);
            const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const secs = String(elapsed % 60).padStart(2, '0');
            timerEl.innerText = `⏱ ${mins}:${secs}`;
        }, 1000);
    }

    // --- SYSTEM LOGIC ---
    function init() {
        transitStartTime = Date.now();
        startVisualTimer();
        spawnParticles();
        startWalkingPhase();
    }

    function spawnParticles() {
        particleInterval = setInterval(() => {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
            particlesContainer.appendChild(particle);
            setTimeout(() => { particle.remove(); }, 4000);
        }, 300);
    }

    function spawnArchway() {
        const arch = document.createElement('div');
        arch.className = 'archway';
        arch.style.animation = 'walkForward 3.5s linear forwards';
        archesContainer.appendChild(arch);
        setTimeout(() => { arch.remove(); }, 3400);
    }

    function startWalkingPhase() {
        const depthDarkness = 0.9 - (currentIndex * 0.1);
        corridorWalls.style.backgroundImage = `
            linear-gradient(90deg, rgba(0,0,0,${depthDarkness}) 0%, transparent 20%, transparent 80%, rgba(0,0,0,${depthDarkness}) 100%),
            linear-gradient(0deg, rgba(0,229,255,0.05) 0%, transparent 50%)`;

        spawnArchway();
        walkingInterval = setInterval(spawnArchway, 1200);

        setTimeout(() => {
            clearInterval(walkingInterval);
            triggerTrial();
        }, 2800);
    }

    function triggerTrial() {
        if (currentIndex >= questions.length) {
            triggerFinalGate();
            return;
        }

        isAnswering = false;
        const currentQ = questions[currentIndex];
        
        uiProgress.innerText = (currentIndex + 1) + "/5";
        qNumber.innerText = (currentIndex + 1);
        qText.innerHTML = currentQ.q;
        qOptions.innerHTML = '';

        const continueBtn = document.getElementById('quiz-continue-btn');
        if (continueBtn) continueBtn.style.display = 'none';

        currentQ.options.forEach((opt, index) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = opt;
            btn.onclick = () => selectAnswer(index, currentQ.correct, btn);
            qOptions.appendChild(btn);
        });

        quizLayer.classList.add('active');
    }

    function selectAnswer(selectedIndex, correctIndex, btnElement) {
        if (isAnswering) return;
        isAnswering = true;

        const allBtns = qOptions.querySelectorAll('.option-btn');

        if (selectedIndex === correctIndex) {
            btnElement.classList.add('correct');
            clickSound.currentTime = 0;
            clickSound.play();
            totalCorrect++;
            totalScore += 1;
        } else {
            btnElement.classList.add('wrong');
            wrongSound.currentTime = 0;
            wrongSound.play();
            allBtns[correctIndex].classList.add('correct');
            totalWrong++;
        }

        uiScore.innerText = totalScore;

        const continueBtn = document.getElementById('quiz-continue-btn');
        if (continueBtn) {
            continueBtn.style.display = 'block';
            continueBtn.onclick = () => {
                quizLayer.classList.remove('active');
                continueBtn.style.display = 'none';
                currentIndex++;

                setTimeout(() => {
                    if (currentIndex < questions.length) {
                        startWalkingPhase();
                    } else {
                        triggerFinalGate();
                    }
                }, 600);
            };
        } else {
            setTimeout(() => {
                quizLayer.classList.remove('active');
                currentIndex++;
                setTimeout(() => {
                    if (currentIndex < questions.length) {
                        startWalkingPhase();
                    } else {
                        triggerFinalGate();
                    }
                }, 600);
            }, 1500);
        }
    }

    function triggerFinalGate() {
        const gateLayer = document.getElementById('gate-layer');
        const gateLeft = document.getElementById('gate-left');
        const gateRight = document.getElementById('gate-right');
        const gateSeal = document.getElementById('gate-seal');
        const gateGlow = document.getElementById('gate-glow');
        
        gateLayer.style.opacity = '1';
        gateLayer.style.pointerEvents = 'auto';
        
        setTimeout(() => {
            gateSeal.classList.add('break');
        }, 1000);

        setTimeout(() => {
            gateSound.currentTime = 0;
            gateSound.play();

            gateLeft.classList.add('open');
            gateRight.classList.add('open');
            gateGlow.style.opacity = '1';
        }, 2000);

        setTimeout(() => {
            showSummary();
        }, 3500);
    }

    function showSummary() {
        if (timerInterval) clearInterval(timerInterval);
        const summaryLayer = document.getElementById('summary-layer');

        const elapsedSeconds = Math.round((Date.now() - transitStartTime) / 1000);
        
        const minutes = Math.floor(elapsedSeconds / 60);
        const remainingSeconds = String(elapsedSeconds % 60).padStart(2, '0');
        const timeDisplayStr = `${minutes}分${remainingSeconds}秒`;

        let session = loadGameSession();
        session.transitScore = totalCorrect; 
        session.transitTime = elapsedSeconds;
        session.transitTimeSeconds = elapsedSeconds;
        session.transitTimeDisplay = timeDisplayStr;
        saveGameSession(session);

        correctSound.currentTime = 0;
        correctSound.play();

        summaryLayer.style.opacity = '1';
        summaryLayer.style.pointerEvents = 'auto';

        setTimeout(() => {
            proceedToLevel2();
        }, 2000);
    }

    function proceedToLevel2() {
        window.location.href = "transit_summary.html";
    }

    /* ==========================================
       QoL: RPG-STYLE INTRO TYPEWRITER CONTROLLER
       ========================================== */
    let introState = {
        element: null,
        lines: [],
        currentLineIdx: 0,
        currentCharIdx: 0,
        isTyping: false,
        isWaiting: false,
        onDone: null,
        typingTimeout: null,
        waitingTimeout: null,
        completedHTML: ""
    };

    function runIntroTypewriter(element, linesArray, lineIdx, onDone) {
        if (lineIdx === 0) {
            introState.element = element;
            introState.lines = linesArray;
            introState.currentLineIdx = 0;
            introState.completedHTML = "";
            introState.onDone = onDone;
            
            if (introState.typingTimeout) clearTimeout(introState.typingTimeout);
            if (introState.waitingTimeout) clearTimeout(introState.waitingTimeout);
        }
        startIntroLine(lineIdx);
    }

    function startIntroLine(lineIdx) {
        if (lineIdx >= introState.lines.length) {
            introState.isTyping = false;
            introState.isWaiting = false;
            if (introState.onDone) introState.onDone();
            return;
        }

        introState.currentLineIdx = lineIdx;
        introState.currentCharIdx = 0;
        introState.isTyping = true;
        introState.isWaiting = false;

        if (introState.typingTimeout) clearTimeout(introState.typingTimeout);
        if (introState.waitingTimeout) clearTimeout(introState.waitingTimeout);

        let curLine = introState.lines[lineIdx];
        let prefix = (lineIdx > 0) ? "<br>" : "";

        function writeChar() {
            if (introState.currentCharIdx < curLine.length) {
                introState.element.innerHTML = introState.completedHTML + prefix + curLine.substring(0, introState.currentCharIdx + 1);
                introState.currentCharIdx++;
                playTypewriterTickSound();
                introState.typingTimeout = setTimeout(writeChar, 80);
            } else {
                finishIntroLine();
            }
        }
        writeChar();
    }

    function finishIntroLine() {
        introState.isTyping = false;
        introState.isWaiting = true;

        if (introState.typingTimeout) clearTimeout(introState.typingTimeout);

        let curLine = introState.lines[introState.currentLineIdx];
        let prefix = (introState.currentLineIdx > 0) ? "<br>" : "";

        introState.element.innerHTML = introState.completedHTML + prefix + curLine;
        introState.completedHTML = introState.element.innerHTML;

        introState.waitingTimeout = setTimeout(() => {
            introState.isWaiting = false;
            startIntroLine(introState.currentLineIdx + 1);
        }, 400);
    }

    function skipIntroDialogue() {
        if (introState.isTyping) {
            finishIntroLine();
        } else if (introState.isWaiting) {
            introState.isWaiting = false;
            if (introState.waitingTimeout) clearTimeout(introState.waitingTimeout);
            startIntroLine(introState.currentLineIdx + 1);
        } else {
            const btnReady = document.getElementById('btn-intro-ready');
            if (btnReady && btnReady.style.display !== 'none') {
                btnReady.click();
            }
        }
    }

    /* ==========================================
       电影级章节过渡时序控制
       ========================================== */
    window.onload = () => {
        triggerCinematicChapterTransition();
    };

    function startDialogueSequence() {
        if (dialogueStarted) return;
        dialogueStarted = true;

        const hudLayer = document.getElementById('cinematic-hud-layer');
        if (hudLayer) {
            hudLayer.style.display = 'flex';
            hudLayer.style.opacity = '1';
            hudLayer.style.transition = 'none';
        }

        const mentor = document.getElementById('intro-mentor');
        if (mentor) {
            mentor.style.opacity = '1';
            mentor.style.transform = 'translateY(0)';
            mentor.style.transition = 'none';
        }

        const titles = document.getElementById('intro-mentor-titles');
        if (titles) {
            titles.style.opacity = '1';
            titles.style.transition = 'none';
        }

        playMentorAppearSound();

        const diagBox = document.getElementById('intro-dialogue-box');
        if (diagBox) {
            const lines = [
                "欢迎回来。",
                "知识长廊已开启。",
                "回答五道历史问题。",
                "准备开始挑战吧！"
            ];
            runIntroTypewriter(diagBox, lines, 0, () => {
                const btnReady = document.getElementById('btn-intro-ready');
                if (btnReady) btnReady.style.display = 'block';
            });
        }
    }

    function jumpToMentorScene() {
        if (cinematicSkipped) return;
        cinematicSkipped = true;

        clearCinematicTimeouts();

        // 1. Hide chapter text overlay
        const textOverlay = document.getElementById('chapter-text-overlay');
        if (textOverlay) {
            textOverlay.style.display = 'none';
        }

        // 2. Hide wooden doors
        const woodLeft = document.getElementById('wood-left');
        const woodRight = document.getElementById('wood-right');
        if (woodLeft) woodLeft.style.display = 'none';
        if (woodRight) woodRight.style.display = 'none';

        // 3. Force background of wrapper to black
        const introScreen = document.getElementById('transit-intro-screen');
        if (introScreen) {
            introScreen.style.background = '#000000';
        }

        // 4. Force stone portal container to its final size and state
        const portal = document.getElementById('stone-portal-container');
        if (portal) {
            portal.style.display = 'flex';
            portal.style.transform = 'scale(1.1)';
            portal.style.filter = 'blur(0px)';
            portal.style.opacity = '1';
            portal.style.transition = 'none';
        }

        // 5. Play ambient music if not yet playing
        const audioBg = document.getElementById("bgMusic");
        if (audioBg && audioBg.paused) {
            audioBg.volume = 0.25;
            audioBg.play().catch(() => {});
        }

        // 6. Instantly launch the dialog systems
        startDialogueSequence();
    }

    // 章节转场电影时序线
    function triggerCinematicChapterTransition() {
        initWebAudio();
        playMagicWhooshSound();
        
        const textOverlay = document.getElementById('chapter-text-overlay');
        if (textOverlay) {
            textOverlay.style.display = 'block';
            addCinematicTimeout(() => { textOverlay.style.opacity = '1'; }, 50);
        }

        addCinematicTimeout(() => {
            const subText = document.getElementById('chapter-step-sub');
            if (subText) subText.style.opacity = '1';
        }, 1000);

        addCinematicTimeout(() => {
            if (textOverlay) textOverlay.style.opacity = '0';
            
            addCinematicTimeout(() => {
                if (textOverlay) textOverlay.style.display = 'none';
                
                const woodLeft = document.getElementById('wood-left');
                const woodRight = document.getElementById('wood-right');
                if (woodLeft && woodRight) {
                    woodLeft.style.transform = 'translateX(0)';
                    woodRight.style.transform = 'translateX(0)';
                }
                
                playWoodSlamSound();
                triggerGoldenParticleBurst();

                addCinematicTimeout(() => {
                    const introScreen = document.getElementById('transit-intro-screen');
                    if (introScreen) introScreen.style.background = '#000000';
                    if (woodLeft && woodRight) {
                        woodLeft.style.opacity = '0';
                        woodRight.style.opacity = '0';
                        woodLeft.style.transition = 'opacity 0.8s ease';
                        woodRight.style.transition = 'opacity 0.8s ease';
                    }

                    addCinematicTimeout(() => {
                        const audioBg = document.getElementById("bgMusic");
                        if (audioBg && audioBg.paused) {
                            audioBg.volume = 0.25;
                            audioBg.play().catch(() => {});
                        }

                        const portal = document.getElementById('stone-portal-container');
                        if (portal) {
                            portal.style.display = 'flex';
                            playMagicWhooshSound();

                            addCinematicTimeout(() => {
                                portal.style.transform = 'scale(1.1)';
                                portal.style.filter = 'blur(0px)';
                            }, 50);
                        }

                        addCinematicTimeout(() => {
                            startDialogueSequence();
                        }, 3500);

                    }, 1200);

                }, 1800);

            }, 800);

        }, 2500);
    }

    document.getElementById('btn-intro-ready').addEventListener('click', (e) => {
        e.stopPropagation();
        playMagicWhooshSound();

        const hudLayer = document.getElementById('cinematic-hud-layer');
        if (hudLayer) {
            hudLayer.style.opacity = '0';
            hudLayer.style.transition = 'opacity 0.5s ease';
        }

        const seal = document.getElementById('stone-portal-seal');
        const leftStone = document.getElementById('stone-door-left');
        const rightStone = document.getElementById('stone-door-right');
        const openText = document.getElementById('intro-door-open-text');

        setTimeout(() => {
            if (seal) {
                seal.style.transform = 'scale(2.5)';
                seal.style.opacity = '0';
            }
            gateSound.currentTime = 0;
            gateSound.play();
        }, 300);

        setTimeout(() => {
            if (leftStone) {
                leftStone.style.transform = 'rotateY(-90deg) translateX(-50px)';
                leftStone.style.opacity = '0';
            }
            if (rightStone) {
                rightStone.style.transform = 'rotateY(90deg) translateX(50px)';
                rightStone.style.opacity = '0';
            }
            if (openText) {
                openText.style.display = 'block';
                setTimeout(() => { openText.style.opacity = '1'; }, 50);
            }
        }, 800);

        setTimeout(() => {
            const portal = document.getElementById('stone-portal-container');
            if (portal) {
                portal.style.transform = 'scale(2.5)';
                portal.style.transition = 'transform 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
            }

            const introScreen = document.getElementById('transit-intro-screen');
            if (introScreen) {
                introScreen.style.transition = 'opacity 1.0s ease';
                introScreen.style.opacity = '0';
            }

            setTimeout(() => {
                if (introScreen) introScreen.style.display = 'none';
                init();
            }, 1000);

        }, 2800);
    });

    function triggerGoldenParticleBurst() {
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.background = '#ffd700';
            p.style.boxShadow = '0 0 8px 2px #ffd700';
            p.style.left = (Math.random() * 80 + 10) + '%';
            p.style.bottom = '10%';
            p.style.animationDuration = (Math.random() * 1.5 + 1.0) + 's';
            particlesContainer.appendChild(p);
            setTimeout(() => { p.remove(); }, 2500);
        }
    }

    /* ==========================================
       轻量级：Web Audio 声音合成单元
       ========================================== */
    let webAudioCtx = null;
    function initWebAudio() {
        if (!webAudioCtx) {
            webAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (webAudioCtx.state === 'suspended') {
            webAudioCtx.resume().catch(() => {});
        }
    }

    function playTypewriterTickSound() {
        try {
            initWebAudio();
            if (!webAudioCtx || webAudioCtx.state === 'suspended') return;
            const osc = webAudioCtx.createOscillator();
            const g = webAudioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1500 + Math.random() * 200, webAudioCtx.currentTime);
            g.gain.setValueAtTime(0.003, webAudioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, webAudioCtx.currentTime + 0.02);
            osc.connect(g);
            g.connect(webAudioCtx.destination);
            osc.start();
            osc.stop(webAudioCtx.currentTime + 0.03);
        } catch(e) {}
    }

    function playMentorAppearSound() {
        try {
            initWebAudio();
            if (!webAudioCtx || webAudioCtx.state === 'suspended') return;
            const osc = webAudioCtx.createOscillator();
            const g = webAudioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(220, webAudioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, webAudioCtx.currentTime + 0.8);
            g.gain.setValueAtTime(0, webAudioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.12, webAudioCtx.currentTime + 0.3);
            g.gain.exponentialRampToValueAtTime(0.001, webAudioCtx.currentTime + 1.0);
            osc.connect(g);
            g.connect(webAudioCtx.destination);
            osc.start();
            osc.stop(webAudioCtx.currentTime + 1.1);
        } catch(e) {}
    }

    function playMagicWhooshSound() {
        try {
            initWebAudio();
            if (!webAudioCtx) return;
            const osc = webAudioCtx.createOscillator();
            const g = webAudioCtx.createGain();
            const filter = webAudioCtx.createBiquadFilter();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, webAudioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, webAudioCtx.currentTime + 0.6);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(500, webAudioCtx.currentTime);
            g.gain.setValueAtTime(0, webAudioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.2, webAudioCtx.currentTime + 0.2);
            g.gain.exponentialRampToValueAtTime(0.001, webAudioCtx.currentTime + 0.6);
            osc.connect(filter);
            filter.connect(g);
            g.connect(webAudioCtx.destination);
            osc.start();
            osc.stop(webAudioCtx.currentTime + 0.65);
        } catch(e) {}
    }

    function playWoodSlamSound() {
        try {
            initWebAudio();
            if (!webAudioCtx) return;
            const now = webAudioCtx.currentTime;
            const osc = webAudioCtx.createOscillator();
            const g = webAudioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
            g.gain.setValueAtTime(0.4, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.connect(g);
            g.connect(webAudioCtx.destination);
            osc.start();
            osc.stop(now + 0.65);
        } catch(e) {}
    }
</script>

        bgMusic.play();

}, { once: true });

        if (!dialogueStarted) {
