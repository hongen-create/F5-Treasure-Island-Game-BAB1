<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Sovereign's Relic - 寻宝岛 (Level 1)</title>
    <style>
        /* 核心重置 / CORE RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Palatino Linotype', 'Book Antiqua', serif, 'Microsoft YaHei'; }
        body { 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
        }

        /* --- PRELOADER STYLES --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #d4af37;
            text-align: center;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-text { font-size: 18px; letter-spacing: 2px; margin-bottom: 8px; }
        .loading-subtext { font-size: 12px; color: #8b6508; letter-spacing: 1px; }

        /* 游戏主容器 / GAME CONTAINER (Initially Hidden) */
        #game-container {
            display: none; /* Hidden until assets loaded */
            width: 100%; max-width: 450px; 
            height: 100vh; 
            height: 100dvh; 
            max-height: 900px;
            position: relative; overflow: hidden;
            background-image: url('treasure-island-background.webp');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1);
        }

        /* 电影级：NPC 浮动动画 */
        @keyframes npcFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }

        /* 电影级：任务完成圣光呼吸特效 */
        @keyframes pulseTransition {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        /* 环境光影 / ATMOSPHERE */
        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(0,2,10,0.8) 100%);
            pointer-events: none; z-index: 10;
        }

        /* 侧边栏 (寻找面板) / FIND PANEL */
        #find-panel {
            position: absolute; left: 10px; top: 10%; bottom: 10%; width: 60px;
            background: rgba(15, 10, 5, 0.85);
            border: 2px solid #8b6508; border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
            z-index: 20; padding: 10px 0; backdrop-filter: blur(4px);
        }

        .ui-item {
            width: 40px; height: 40px;
            opacity: 0.3; filter: grayscale(100%);
            transition: all 0.5s ease;
            object-fit: contain;
        }
        
        .ui-item.found {
            opacity: 1; filter: grayscale(0%) drop-shadow(0 0 8px #ffdf70);
            transform: scale(1.1);
        }

        /* 隐藏物品 / HIDDEN OBJECTS */
        #objects-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; }

        .hidden-object {
            position: absolute; cursor: pointer;
            width: 50px; height: auto;
            transition: filter 0.3s, transform 0.2s;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
        }

        .hidden-object:hover { filter: brightness(1.2) drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); }
        .hidden-object:active { transform: scale(0.9); }

        /* 点击发光动画 / DISCOVERY ANIMATION */
        .object-glow { animation: reveal 1.2s forwards ease-out; pointer-events: none; z-index: 50; }
        @keyframes reveal {
            0% { filter: brightness(1.5) drop-shadow(0 0 15px #ffdf70); transform: scale(1); }
            40% { filter: brightness(2) drop-shadow(0 0 30px #fff); transform: scale(1.5) translateY(-20px); opacity: 1; }
            100% { transform: scale(0) translateY(-50px); opacity: 0; }
        }

        /* 答题卷轴 / SCROLL UI */
        #scroll-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }

        .scroll-content {
            width: 85%; padding: 25px;
            background: linear-gradient(135deg, #e3cfa8 0%, #b89765 100%);
            border: 3px solid #4a3020; box-shadow: 0 0 30px #000;
            border-radius: 6px; text-align: center; color: #2d1b11;
        }

        h3 { font-size: 16px; margin-bottom: 20px; font-weight: bold; line-height: 1.4; }

        .option-btn {
            display: block; width: 100%; padding: 12px; margin-bottom: 10px;
            background: rgba(255,255,255,0.4); border: 2px solid #735335; border-radius: 4px;
            color: #2d1b11; font-size: 14px; font-weight: bold; text-align: left;
            cursor: pointer; transition: all 0.2s;
        }

        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct { background: #388e3c; color: #fff; border-color: #1b5e20; }
        .option-btn.wrong { background: #d32f2f; color: #fff; border-color: #b71c1c; }

        /* 屏幕覆盖 (开始/结束) / SCREENS */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: #d4bb8c; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center;
        }

        .action-btn {
            margin-top: 30px; padding: 15px 30px;
            background: linear-gradient(to bottom, #d4af37, #8b6508);
            border: 2px solid #ffdf70; border-radius: 30px; color: #fff; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.8); transition: transform 0.2s;
        }
        
        .action-btn:active { transform: scale(0.95); }

        /* --- 电影级开场样式 --- */
        #mentor-npc {
            position: absolute; bottom: -5px; right: 10px; width: 110px; height: auto;
            z-index: 205; opacity: 0; transform: translateY(30px);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            pointer-events: none;
        }
        #mentor-npc.visible { opacity: 1; transform: translateY(0); }
        .npc-image {
            width: 100%; height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8));
            animation: npcFloat 4s ease-in-out infinite alternate;
        }

        #dialogue-box {
            position: absolute; bottom: 25px; left: 12px; right: 130px;
            background: rgba(12, 20, 16, 0.96); border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 6px; padding: 12px; z-index: 210; opacity: 0;
            transform: translateY(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            cursor: pointer;
        }
        #dialogue-box.visible { opacity: 1; transform: translateY(0); }

        .dialogue-text-wrapper { position: relative; margin-top: 4px; }
        #dialogue-text {
            font-size: 13px; line-height: 1.6; color: #e2d7c5;
            letter-spacing: 1px; max-height: 85px; overflow-y: auto; padding-right: 6px; scroll-behavior: smooth;
        }
        #dialogue-text::-webkit-scrollbar { width: 4px; }
        #dialogue-text::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        #dialogue-text::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #d4af37, #8b6508); }
        
        .dialogue-fade-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 15px;
            background: linear-gradient(to top, rgba(12, 20, 16, 0.98), transparent);
            pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
        }
        .dialogue-fade-overlay.visible { opacity: 1; }
        
        .dialogue-scroll-indicator {
            position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
            font-size: 10px; color: #ffdf70; background: rgba(12, 20, 16, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.4); padding: 2px 8px; border-radius: 10px;
            pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
            white-space: nowrap; letter-spacing: 1px; animation: bounceIndicator 1.5s infinite alternate;
        }
        .dialogue-scroll-indicator.visible { opacity: 1; }
        @keyframes bounceIndicator { 0% { transform: translateX(-50%) translateY(0); } 100% { transform: translateX(-50%) translateY(3px); } }

        @media (max-width: 768px) {
            #mentor-npc { width: 95px; bottom: 12px; right: 8px; }
            #dialogue-box { right: 110px; left: 10px; bottom: 25px; padding: 10px; }
            #dialogue-text { font-size: 12.5px; line-height: 1.5; max-height: 75px; }
        }
    </style>
</head>
<body>

<!-- PRELOADER -->

<div id="game-container">

    <div id="start-screen" class="screen" style="background: transparent;">
        <div id="touch-to-start" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 300; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;">
            <div style="font-size: 14px; color: #ffd700; letter-spacing: 2px; margin-bottom: 4px; text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);">第一关 · 寻宝岛</div>
            <div style="font-size: 1.1rem; color: #ffe066; letter-spacing: 2px; animation: pulseTransition 1.2s infinite alternate;">点击屏幕 · 启动任务说明</div>
        </div>

        <div id="mentor-npc">
            <img src="JACK1.png" alt="JACK老师" class="npc-image">
        </div>

            <div style="font-size: 11px; color: #ffd700; letter-spacing: 1px; margin-bottom: 3px;">历史守护者联盟导师</div>
            <div style="font-size: 14px; color: #ffffff; font-weight: bold; letter-spacing: 2px; margin-bottom: 8px;">万能教·JACK老师</div>

                <div id="dialogue-text"></div>

        <div style="position: relative; width: 100px; height: 100px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center;">
            <div style="position: absolute; width: 70px; height: 70px; background: radial-gradient(circle, #ffd700 0%, transparent 70%); filter: blur(8px); animation: pulseTransition 1.5s infinite alternate;"></div>
            <span style="font-size: 3rem; position: relative; z-index: 10; filter: drop-shadow(0 0 10px #ffd700);">📜</span>
        </div>
        <h1 style="font-size: 26px; color: #ffdf70; margin-bottom: 12px; letter-spacing: 4px; text-shadow: 0 0 15px rgba(255,215,0,0.6);">任务完成</h1>
        <p style="font-size: 15px; color: #a3b899; letter-spacing: 2px;">历史档案整理中...</p>

</div>

<script>
    const SESSION_KEY = 'sovereigns_relic_session';
    
    const gameData = [
        { id: 'key', src: 'golden-key.png', x: 20, y: 85, q: "Apakah maksud Sovereignty dalam bahasa Inggeris?", opts: ["Negara berhak menentukan sempadan", "Negara bersatu menentang penceroboh", "Negara berkuasa penuh dalam pentadbiran", "Negara berjuang menuntut kemerdekaan"], ans: 2 },
        { id: 'coin', src: 'pirate-coin.png', x: 80, y: 55, q: "Apakah perundangan yang menjadi asas kepada sistem peraturan negara kita?", opts: ["Undang-undang adat", "Hukum Kanun Melaka", "Undang-undang syariah", "Perlembagaan Persekutuan"], ans: 3 },
        { id: 'lantern', src: 'lantern.png', x: 60, y: 35, q: "Dasar Pembangunan Ekonomi dibentuk selepas merdeka. Apakah matlamat yang hendak dicapai?", opts: ["Mentransformasikan ekonomi", "Meningkat taraf hidup rakyat", "Memantapkan peranan FELDA", "Memperkenalkan pertanian dagangan"], ans: 1 },
        { id: 'sword', src: 'curved-sword.png', x: 35, y: 18, q: "Yang manakah berkaitan dengan pengiktirafan PBB terhadap sesebuah negara?", opts: ["Kedaulatan tradisional", "Kedaulatan moden", "Kedaulatan undang-undang", "Kedaulatan antarabangsa"], ans: 3 },
        { id: 'chest', src: 'treasure-chest.png', x: 50, y: 6, q: "Tokoh X: 'Kedaulatan dibina berdasarkan prinsip kebebasan dan keadilan'. Siapakah X?", opts: ["Aristotle", "Jean Bodin", "Ibn Khaldun", "Tunku Abdul Rahman"], ans: 2 }
    ];

    let level1StartTime = 0;
    let level1CorrectCount = 0;

    // --- ASSET PRELOADER SYSTEM ---
    const assetsToLoad = [
        'treasure-island-background.webp',
        'JACK1.png',
        'golden-key.png',
        'pirate-coin.png',
        'lantern.png',
        'curved-sword.png',
        'treasure-chest.png'
    ];

    function preloadAssets(urls, callback) {
        let loadedCounter = 0;
        const total = urls.length;
        if (total === 0) return callback();

        urls.forEach(url => {
            const img = new Image();
            img.onload = img.onerror = () => {
                loadedCounter++;
                if (loadedCounter === total) {
                    callback();
                }
            };
            img.src = url;
        });
    }

    // Initialize Game sequence after preloading
    window.addEventListener('load', () => {
        preloadAssets(assetsToLoad, () => {
            // 1. Build the world
            buildGameWorld();
            loadGameSession();
            
            // 2. Hide loading screen and show game container
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            // 3. Ready to start
            const touchToStart = document.getElementById('touch-to-start');
            touchToStart.addEventListener('click', () => {
                touchToStart.style.display = 'none';
                triggerCinematicOpening();
            });
        });
    });

    function generateAttemptId() {
        const now = new Date();
        return `HIS-${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}-${Date.now()}`;
    }

    function createDefaultSession() {
        return {
            attemptId: generateAttemptId(),
            date: new Date().toISOString(),
            completedStatus: false,
            googleSheetUploaded: false,
            level1Score: 0,
            level1Time: 0,
            transitScore: 0,
            transitTime: 0,
            level2Score: 0,
            level2Time: 0,
            totalTime: 0,
            q1_q5_answers: [{ "questionId": "Q1", "answer": "" },{ "questionId": "Q2", "answer": "" },{ "questionId": "Q3", "answer": "" },{ "questionId": "Q4", "answer": "" },{ "questionId": "Q5", "answer": "" }],
            learningType: '', name: '', phone: '', email: ''
        };
    }

    function initializeGameSession() {
        let session = localStorage.getItem(SESSION_KEY);
        if (!session) {
            session = createDefaultSession();
            localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        }
        return JSON.parse(session);
    }

    function saveGameSession(sessionData) { localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData)); }
    function loadGameSession() { const session = localStorage.getItem(SESSION_KEY); return session ? JSON.parse(session) : initializeGameSession(); }

    /* AUDIO ENGINE */
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playNote(freq, type, duration, vol, startTime) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, startTime);
        gain.gain.setValueAtTime(vol, startTime); gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(startTime); osc.stop(startTime + duration);
    }
    function startBGM() { const bgMusic = document.getElementById("bgMusic"); if (bgMusic) { bgMusic.volume = 0.25; bgMusic.play().catch(() => {}); } }
    function playPickup() { if(!audioCtx) return; const t = audioCtx.currentTime; playNote(523.25, 'sine', 0.15, 0.1, t); playNote(659.25, 'sine', 0.15, 0.1, t + 0.1); playNote(783.99, 'sine', 0.3, 0.1, t + 0.2); }
    function playPopup() { if(!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.5); gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.2); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.5); }
    function playCorrect() { if(!audioCtx) return; const t = audioCtx.currentTime; playNote(523.25, 'triangle', 0.5, 0.2, t); playNote(659.25, 'triangle', 0.5, 0.2, t); playNote(783.99, 'triangle', 0.5, 0.2, t); playNote(1046.50, 'triangle', 0.8, 0.2, t + 0.1); }
    function playWrong() { if(!audioCtx) return; const t = audioCtx.currentTime; playNote(150, 'sawtooth', 0.3, 0.15, t); playNote(100, 'sawtooth', 0.4, 0.15, t + 0.2); }
    function playComplete() { if(!audioCtx) return; const t = audioCtx.currentTime; playNote(523.25, 'sine', 0.3, 0.2, t); playNote(659.25, 'sine', 0.3, 0.2, t + 0.2); playNote(783.99, 'sine', 0.3, 0.2, t + 0.4); playNote(1046.50, 'triangle', 1.5, 0.3, t + 0.6); }
    function playTypewriterTick() { if (!audioCtx) return; const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(1400 + Math.random() * 200, audioCtx.currentTime); g.gain.setValueAtTime(0.004, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.02); osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.03); }
    function playMentorAppear() { if (!audioCtx) return; const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(220, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.8); g.gain.setValueAtTime(0, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.3); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0); osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 1.1); }
    function playStartFlourish(onDone) { if (!audioCtx) { onDone(); return; } const now = audioCtx.currentTime; [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, idx) => { const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); const noteTime = now + idx * 0.05; osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, noteTime); g.gain.setValueAtTime(0, noteTime); g.gain.linearRampToValueAtTime(0.08, noteTime + 0.02); g.gain.exponentialRampToValueAtTime(0.001, noteTime + 0.4); osc.connect(g); g.connect(audioCtx.destination); osc.start(noteTime); osc.stop(noteTime + 0.45); }); setTimeout(onDone, 450); }

    function transitionToNextLevel() {
        if (timerInterval) clearInterval(timerInterval);
        const elapsedSeconds = Math.round((Date.now() - level1StartTime) / 1000);
        let session = loadGameSession();
        session.level1Score = level1CorrectCount;
        session.level1Time = elapsedSeconds;
        saveGameSession(session);
        window.location.href = 'level1_summary.html';
    }

    let itemsFound = 0;

    function triggerCinematicOpening() {
        initAudio(); startBGM();
        const diagTextEl = document.getElementById('dialogue-text');
        if (diagTextEl) diagTextEl.addEventListener('scroll', () => updateScrollIndicator(diagTextEl));

        const mentor = document.getElementById('mentor-npc');
        mentor.classList.add('visible');
        playMentorAppear();

        setTimeout(() => {
            document.getElementById('dialogue-box').classList.add('visible');
            runTypewriter(diagTextEl, ["欢迎来到寻宝岛。", "寻找全部历史文物。", "回答相关历史问题。", "准备开始探索吧！"], 0, () => {
                autoStartTimeout = setTimeout(proceedToGameDirectly, 1500);
            });
        }, 1000);
    }

    /* TYPEWRITER LOGIC */
    let typewriterState = { element: null, lines: [], currentLineIdx: 0, currentCharIdx: 0, isTyping: false, isWaiting: false, onDone: null, typingTimeout: null, waitingTimeout: null, completedHTML: "" };
    let dialogueFullyDone = false;
    let autoStartTimeout = null;

    function runTypewriter(element, linesArray, lineIdx, onDone) {
        if (lineIdx === 0) { dialogueFullyDone = false; typewriterState.element = element; typewriterState.lines = linesArray; typewriterState.currentLineIdx = 0; typewriterState.completedHTML = ""; typewriterState.onDone = () => { dialogueFullyDone = true; onDone(); }; }
        startTypingLine(lineIdx);
    }

    function startTypingLine(lineIdx) {
        if (lineIdx >= typewriterState.lines.length) { typewriterState.isTyping = false; typewriterState.isWaiting = false; if (typewriterState.onDone) typewriterState.onDone(); return; }
        typewriterState.currentLineIdx = lineIdx; typewriterState.currentCharIdx = 0; typewriterState.isTyping = true; typewriterState.isWaiting = false;
        if (typewriterState.typingTimeout) clearTimeout(typewriterState.typingTimeout);
        if (typewriterState.waitingTimeout) clearTimeout(typewriterState.waitingTimeout);
        let curLine = typewriterState.lines[lineIdx];
        let prefix = (lineIdx > 0) ? "<br>" : "";
        function writeChar() {
            if (typewriterState.currentCharIdx < curLine.length) {
                typewriterState.element.innerHTML = typewriterState.completedHTML + prefix + curLine.substring(0, typewriterState.currentCharIdx + 1);
                typewriterState.currentCharIdx++; playTypewriterTick();
                typewriterState.element.scrollTop = typewriterState.element.scrollHeight;
                updateScrollIndicator(typewriterState.element);
                typewriterState.typingTimeout = setTimeout(writeChar, 80);
            } else { finishCurrentLine(); }
        }
        writeChar();
    }

    function finishCurrentLine() {
        typewriterState.isTyping = false; typewriterState.isWaiting = true;
        if (typewriterState.typingTimeout) clearTimeout(typewriterState.typingTimeout);
        let curLine = typewriterState.lines[typewriterState.currentLineIdx];
        let prefix = (typewriterState.currentLineIdx > 0) ? "<br>" : "";
        typewriterState.element.innerHTML = typewriterState.completedHTML + prefix + curLine;
        typewriterState.completedHTML = typewriterState.element.innerHTML;
        typewriterState.element.scrollTop = typewriterState.element.scrollHeight;
        updateScrollIndicator(typewriterState.element);
        typewriterState.waitingTimeout = setTimeout(() => { typewriterState.isWaiting = false; startTypingLine(typewriterState.currentLineIdx + 1); }, 400);
    }

    function skipDialogue() {
        if (typewriterState.isTyping) finishCurrentLine();
        else if (typewriterState.isWaiting) { typewriterState.isWaiting = false; clearTimeout(typewriterState.waitingTimeout); startTypingLine(typewriterState.currentLineIdx + 1); }
        else if (dialogueFullyDone) { if (autoStartTimeout) clearTimeout(autoStartTimeout); proceedToGameDirectly(); }
    }

    function updateScrollIndicator(element) {
        const indicator = document.getElementById('dialogue-scroll-indicator');
        const overlay = document.getElementById('dialogue-fade-overlay');
        const isOverflowed = element.scrollHeight > element.clientHeight;
        const isAtBottom = Math.abs(element.scrollHeight - element.clientHeight - element.scrollTop) < 6;
        if (isOverflowed && !isAtBottom) { indicator.classList.add('visible'); if (overlay) overlay.classList.add('visible'); }
        else { indicator.classList.remove('visible'); if (overlay) overlay.classList.remove('visible'); }
    }

    let timerInterval;
    function startVisualTimer() {
        const timerEl = document.getElementById('visual-timer');
        timerEl.style.display = 'block';
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const elapsed = Math.round((Date.now() - level1StartTime) / 1000);
            const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const secs = String(elapsed % 60).padStart(2, '0');
            timerEl.innerText = `⏱ ${mins}:${secs}`;
        }, 1000);
    }

    function proceedToGameDirectly() {
        playStartFlourish(() => {
            document.getElementById('dialogue-box').classList.remove('visible');
            const mentor = document.getElementById('mentor-npc');
            mentor.classList.remove('visible'); mentor.style.opacity = '0';
            const startScreen = document.getElementById('start-screen');
            startScreen.style.transition = 'opacity 0.5s ease'; startScreen.style.opacity = '0';
            setTimeout(() => { startScreen.style.display = 'none'; level1StartTime = Date.now(); startVisualTimer(); }, 500);
        });
    }

    function buildGameWorld() {
        const findPanel = document.getElementById('find-panel');
        const objectsLayer = document.getElementById('objects-layer');
        findPanel.innerHTML = ''; objectsLayer.innerHTML = '';
        gameData.forEach(item => {
            const uiIcon = document.createElement('img'); uiIcon.className = 'ui-item'; uiIcon.id = `ui-${item.id}`; uiIcon.src = item.src;
            findPanel.appendChild(uiIcon);
            const mapObj = document.createElement('img'); mapObj.className = 'hidden-object'; mapObj.id = `obj-${item.id}`; mapObj.src = item.src; mapObj.style.left = `${item.x}%`; mapObj.style.top = `${item.y}%`;
            mapObj.onclick = () => openQuestionPopup(item, mapObj);
            objectsLayer.appendChild(mapObj);
        });
    }

    function openQuestionPopup(itemData, mapObj) {
        playPickup(); mapObj.classList.add('object-glow');
        setTimeout(() => {
            playPopup(); document.getElementById('scroll-overlay').style.display = 'flex';
            document.getElementById('continue-btn').style.display = 'none';
            document.getElementById('question-text').innerText = itemData.q;
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = ''; 
            itemData.opts.forEach((optText, index) => {
                const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = String.fromCharCode(65 + index) + ". " + optText;
                btn.onclick = () => handleAnswerClick(btn, index, itemData, mapObj);
                optsContainer.appendChild(btn);
            });
        }, 800);
    }

    function handleAnswerClick(clickedBtn, selectedIndex, itemData, mapObj) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.onclick = null);
        if (selectedIndex === itemData.ans) { clickedBtn.classList.add('correct'); playCorrect(); level1CorrectCount++; }
        else { clickedBtn.classList.add('wrong'); allBtns[itemData.ans].classList.add('correct'); playWrong(); }
        const continueBtn = document.getElementById('continue-btn');
        continueBtn.style.display = 'block';
        continueBtn.onclick = () => { document.getElementById('scroll-overlay').style.display = 'none'; markItemAsFound(itemData.id, mapObj); };
    }

    function markItemAsFound(itemId, mapObj) {
        document.getElementById(`ui-${itemId}`).classList.add('found');
        mapObj.remove(); itemsFound++;
        if (itemsFound === gameData.length) {
            setTimeout(() => { playComplete(); document.getElementById('transition-screen').style.display = 'flex'; setTimeout(transitionToNextLevel, 2000); }, 800);
        }
    }

    /* PARTICLE SYSTEM */
    const pCanvas = document.getElementById('particleCanvas');
    const pCtx = pCanvas.getContext('2d');
    let gameParticles = [];
    function resizePCanvas() { const container = document.getElementById('game-container'); pCanvas.width = container.clientWidth; pCanvas.height = container.clientHeight; }
    window.addEventListener('resize', resizePCanvas); resizePCanvas();
    class GoldParticle {
        constructor() { this.reset(); this.y = Math.random() * pCanvas.height; }
        reset() { this.x = Math.random() * pCanvas.width; this.y = pCanvas.height + 10; this.size = Math.random() * 1.5 + 0.3; this.speedY = -(Math.random() * 0.35 + 0.1); this.speedX = Math.random() * 0.25 - 0.125; this.alpha = Math.random() * 0.4 + 0.1; }
        update() { this.y += this.speedY; this.x += this.speedX; if (this.y < -10) this.reset(); }
        draw() { pCtx.save(); pCtx.globalAlpha = this.alpha; pCtx.fillStyle = '#ffd700'; pCtx.shadowBlur = 4; pCtx.shadowColor = '#ffd700'; pCtx.beginPath(); pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); pCtx.fill(); pCtx.restore(); }
    }
    for (let i = 0; i < 20; i++) gameParticles.push(new GoldParticle());
    function renderGoldParticles() { pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height); gameParticles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(renderGoldParticles); }
    renderGoldParticles();

    document.getElementById('dialogue-box').addEventListener('click', skipDialogue);
    document.addEventListener("click", () => { const bgMusic = document.getElementById("bgMusic"); if (bgMusic && bgMusic.paused) { bgMusic.volume = 0.25; bgMusic.play().catch(() => {}); } }, { once: true });
</script>

<audio id="bgMusic" loop><source src="game-bgm.mp3" type="audio/mpeg"></audio>
</body>
