<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Sovereign's Relic - 寻宝岛 (Level 1)</title>
    <style>
        /* 核心重置 / CORE RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Palatino Linotype', 'Book Antiqua', serif, 'Microsoft YaHei'; }
        body { 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            height: 100dvh; /* Modern dynamic viewport unit fallback */
            overflow: hidden; 
        }

        /* 游戏主容器 / GAME CONTAINER (9:16) */
        #game-container {
            width: 100%; max-width: 450px; 
            height: 100vh; 
            height: 100dvh; /* Adjusts dynamically to mobile browser address bars */
            max-height: 900px;
            position: relative; overflow: hidden;
            /* 使用本地背景图 / Using local background asset */
            background-image: url('treasure-island-background.webp');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1);
        }

        /* 电影级：NPC 浮动动画 */
        @keyframes npcFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }

        /* 电影级：任务完成圣光呼吸特效 */
        @keyframes pulseTransition {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        /* 环境光影 / ATMOSPHERE */
        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(0,2,10,0.8) 100%);
            pointer-events: none; z-index: 10;
        }

        /* 侧边栏 (寻找面板) / FIND PANEL */
        #find-panel {
            position: absolute; left: 10px; top: 10%; bottom: 10%; width: 60px;
            background: rgba(15, 10, 5, 0.85);
            border: 2px solid #8b6508; border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
            z-index: 20; padding: 10px 0; backdrop-filter: blur(4px);
        }

        .ui-item {
            width: 40px; height: 40px;
            opacity: 0.3; filter: grayscale(100%);
            transition: all 0.5s ease;
            object-fit: contain;
        }
        
        .ui-item.found {
            opacity: 1; filter: grayscale(0%) drop-shadow(0 0 8px #ffdf70);
            transform: scale(1.1);
        }

        /* 隐藏物品 / HIDDEN OBJECTS */
        #objects-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; }

        .hidden-object {
            position: absolute; cursor: pointer;
            width: 50px; height: auto;
            transition: filter 0.3s, transform 0.2s;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
        }

        .hidden-object:hover { filter: brightness(1.2) drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); }
        .hidden-object:active { transform: scale(0.9); }

        /* 点击发光动画 / DISCOVERY ANIMATION */
        .object-glow { animation: reveal 1.2s forwards ease-out; pointer-events: none; z-index: 50; }
        @keyframes reveal {
            0% { filter: brightness(1.5) drop-shadow(0 0 15px #ffdf70); transform: scale(1); }
            40% { filter: brightness(2) drop-shadow(0 0 30px #fff); transform: scale(1.5) translateY(-20px); opacity: 1; }
            100% { transform: scale(0) translateY(-50px); opacity: 0; }
        }

        /* 答题卷轴 / SCROLL UI */
        #scroll-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }

        .scroll-content {
            width: 85%; padding: 25px;
            background: linear-gradient(135deg, #e3cfa8 0%, #b89765 100%);
            border: 3px solid #4a3020; box-shadow: 0 0 30px #000;
            border-radius: 6px; text-align: center; color: #2d1b11;
        }

        h3 { font-size: 16px; margin-bottom: 20px; font-weight: bold; line-height: 1.4; }

        .option-btn {
            display: block; width: 100%; padding: 12px; margin-bottom: 10px;
            background: rgba(255,255,255,0.4); border: 2px solid #735335; border-radius: 4px;
            color: #2d1b11; font-size: 14px; font-weight: bold; text-align: left;
            cursor: pointer; transition: all 0.2s;
        }

        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct { background: #388e3c; color: #fff; border-color: #1b5e20; }
        .option-btn.wrong { background: #d32f2f; color: #fff; border-color: #b71c1c; }

        /* 屏幕覆盖 (开始/结束) / SCREENS */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: #d4bb8c; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center;
        }

        .action-btn {
            margin-top: 30px; padding: 15px 30px;
            background: linear-gradient(to bottom, #d4af37, #8b6508);
            border: 2px solid #ffdf70; border-radius: 30px; color: #fff; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.8); transition: transform 0.2s;
        }
        
        .action-btn:active { transform: scale(0.95); }

        /* --- 电影级开场样式 (两栏优化排版) --- */
        #mentor-npc {
            position: absolute; bottom: -5px; right: 10px; width: 110px; height: auto;
            z-index: 205; opacity: 0; transform: translateY(30px);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            pointer-events: none;
        }
        #mentor-npc.visible { opacity: 1; transform: translateY(0); }
        .npc-image {
            width: 100%; height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8));
            animation: npcFloat 4s ease-in-out infinite alternate;
        }

        /* 优化位置避免与导师卡片重合 */
        #dialogue-box {
            position: absolute; bottom: 25px; left: 12px; right: 130px;
            background: rgba(12, 20, 16, 0.96); border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 6px; padding: 12px; z-index: 210; opacity: 0;
            transform: translateY(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            cursor: pointer; /* added QoL cursor style */
        }
        #dialogue-box.visible { opacity: 1; transform: translateY(0); }

        /* 滚屏及溢出指示辅助样式 */
        .dialogue-text-wrapper {
            position: relative;
            margin-top: 4px;
        }
        #dialogue-text {
            font-size: 13px;
            line-height: 1.6;
            color: #e2d7c5;
            letter-spacing: 1px;
            max-height: 85px;
            overflow-y: auto;
            padding-right: 6px;
            scroll-behavior: smooth;
        }
        /* 游戏风格：暗黑幻想金色滚动条 */
        #dialogue-text::-webkit-scrollbar {
            width: 4px;
        }
        #dialogue-text::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 2px;
        }
        #dialogue-text::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #d4af37, #8b6508);
            border-radius: 2px;
            border: 1px solid rgba(255, 223, 112, 0.3);
        }
        /* 底端溢出遮罩，暗示还有后续内容 */
        .dialogue-fade-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 15px;
            background: linear-gradient(to top, rgba(12, 20, 16, 0.98), transparent);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .dialogue-fade-overlay.visible {
            opacity: 1;
        }
        /* ⬇ 滑动提示气泡样式 */
        .dialogue-scroll-indicator {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #ffdf70;
            background: rgba(12, 20, 16, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 2px 8px;
            border-radius: 10px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            white-space: nowrap;
            letter-spacing: 1px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            animation: bounceIndicator 1.5s infinite alternate;
        }
        .dialogue-scroll-indicator.visible {
            opacity: 1;
        }
        @keyframes bounceIndicator {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(3px); }
        }

        /* 帝国横向藏宝图/卷轴样式 */
        .briefing-scroll {
            position: absolute; height: 380px; display: flex; align-items: center; justify-content: center;
            z-index: 220; opacity: 0; transform: scale(0.1) rotate(-15deg);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); pointer-events: none;
        }
        /* 初始在JACK老师手侧 */
        .briefing-scroll.spawned {
            opacity: 1; transform: scale(1) rotate(0deg); right: 60px; bottom: 120px; width: 44px;
        }
        /* 魔法舒展并移向屏幕中央 */
        .briefing-scroll.unfolded {
            width: 90%; max-width: 390px; left: 5%; right: 5%; top: 15%; bottom: auto;
            transform: scale(1) rotate(0deg); opacity: 1; pointer-events: auto;
            transition: width 1s cubic-bezier(0.25, 1, 0.5, 1), left 1s, right 1s, top 1s, bottom 1s;
        }
        .briefing-paper {
            width: 100%; height: 100%; background: radial-gradient(circle, #f5e8d3 60%, #dec8a5 100%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.85); border-top: 3px double #5a3f12; border-bottom: 3px double #5a3f12;
            z-index: 10; overflow: hidden; padding: 25px 18px; color: #382414;
            display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0;
            transition: opacity 0.5s ease;
        }
        /* Smoothly reveal text content once the map has expanded */
        .briefing-scroll.unfolded .briefing-paper { 
            opacity: 1; 
            transition-delay: 0.8s; 
        }
        .briefing-roller {
            position: absolute; top: -10px; bottom: -10px; width: 16px;
            background: linear-gradient(90deg, #3d240d 0%, #7c5026 30%, #3d240d 100%);
            border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); z-index: 12;
        }
        .briefing-roller-left { left: -8px; }
        .briefing-roller-right { right: -8px; }
        .briefing-roller::before, .briefing-roller::after {
            content: ''; position: absolute; left: -3px; width: 22px; height: 14px;
            background: radial-gradient(circle, #d4af37 20%, #8a6f27 100%); border: 1px solid #5a3f12; border-radius: 50%;
        }
        .briefing-roller::before { top: -11px; }
        .briefing-roller::after { bottom: -11px; }

        /* --- MOBILE LAYOUT FINE-TUNING OVERRIDES --- */
        @media (max-width: 768px) {
            #mentor-npc {
                width: 95px;       /* Scaled down roughly 14% to fit mobile bounds */
                bottom: 12px;      /* Raised 17px to prevent safe-area / folding line cut-off */
                right: 8px;        /* Tighter alignment margin */
            }
            #dialogue-box {
                right: 110px;      /* Expanded text field to utilize space saved by smaller portrait */
                left: 10px;        
                bottom: 25px;      
                padding: 10px;     /* Optimized padding footprint */
            }
            #dialogue-text {
                font-size: 12.5px; /* Compact mobile typography */
                line-height: 1.5;
                max-height: 75px;  /* Compact vertical boundary */
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div class="vignette"></div>

    <!-- 视觉计时器 / VISUAL TIMER -->
    <div id="visual-timer" style="display: none; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(15, 10, 5, 0.75); border: 1px solid #8b6508; border-radius: 20px; padding: 5px 12px; color: #ffdf70; font-family: 'Palatino Linotype', 'Book Antiqua', serif; font-size: 14px; font-weight: bold; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none; letter-spacing: 1px;">⏱ 00:00</div>

    <!-- 粒子特效层（Step 1 环境烘托） -->
    <canvas id="particleCanvas" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 5;"></canvas>

    <div id="find-panel"></div>

    <div id="objects-layer"></div>

    <div id="scroll-overlay">
        <div class="scroll-content">
            <h3 id="question-text"></h3>
            <div id="options-container"></div>
            <!-- Continue Button / 隐藏的继续按钮 -->
            <button id="continue-btn" class="action-btn" style="display: none; margin: 15px auto 0 auto; padding: 10px 25px; font-size: 15px;">继续寻找文物</button>
        </div>
    </div>

    <!-- 变动 1：电影级开场及藏宝图呈递机制 -->
    <div id="start-screen" class="screen" style="background: transparent;">
        <!-- 点击屏幕以启动仪式（遵守音频Autoplay安全规范） -->
        <div id="touch-to-start" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 300; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;">
            <div style="font-size: 14px; color: #ffd700; letter-spacing: 2px; margin-bottom: 4px; text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);">第一关 · 寻宝岛</div>
            <div style="font-size: 1.1rem; color: #ffe066; letter-spacing: 2px; animation: pulseTransition 1.2s infinite alternate;">点击屏幕 · 启动任务说明</div>
        </div>

        <!-- NPC JACK老师 3D质感卡片 -->
        <div id="mentor-npc">
            <img src="JACK1.png" alt="JACK老师" class="npc-image">
        </div>

        <!-- 导师打字机对话框 -->
        <div id="dialogue-box">
            <div style="font-size: 11px; color: #ffd700; letter-spacing: 1px; margin-bottom: 3px;">历史守护者联盟导师</div>
            <div style="font-size: 14px; color: #ffffff; font-weight: bold; letter-spacing: 2px; margin-bottom: 8px;">万能教·JACK老师</div>
            <div class="dialogue-text-wrapper">
                <div id="dialogue-text"></div>
                <div id="dialogue-fade-overlay" class="dialogue-fade-overlay"></div>
            </div>
            <div id="dialogue-scroll-indicator" class="dialogue-scroll-indicator">⬇ 滑动阅读更多</div>
        </div>

        <!-- 横向卷轴藏宝图 -->
        <div class="briefing-scroll state-scroll-init" id="cinematicScrollBriefing">
            <div class="scroll-roller briefing-roller-left"></div>
            <div class="briefing-paper">
                <h2 style="font-size: 1.35rem; font-weight: bold; color: #5a2c00; margin-bottom: 18px; border-bottom: 2px dashed rgba(90,63,18,0.25); padding-bottom: 6px; letter-spacing: 2px;">任务目标</h2>
                <div style="font-size: 0.95rem; line-height: 1.8; color: #4a3424; margin-bottom: 22px; text-align: left; width: 100%; padding-left: 15px;">
                    <p style="margin-bottom: 8px; font-weight: bold;"><span style="color: #27ae60; margin-right: 8px;">✓</span> 找到全部历史文物</p>
                    <p style="margin-bottom: 8px; font-weight: bold;"><span style="color: #27ae60; margin-right: 8px;">✓</span> 回答相关历史问题</p>
                    <p style="margin-bottom: 8px; font-weight: bold;"><span style="color: #27ae60; margin-right: 8px;">✓</span> 解锁下一座遗迹</p>
                </div>
                <button class="action-btn" style="margin-top: 0; padding: 10px 32px; font-size: 15px;" onclick="closeBriefingAndStartGame()">开始寻找文物</button>
            </div>
            <div class="scroll-roller briefing-roller-right"></div>
        </div>
    </div>

    <!-- 变动 4：任务完成圣光过渡层 -->
    <div id="transition-screen" class="screen" style="display: none; background: radial-gradient(circle at center, rgba(18, 30, 24, 0.96) 0%, rgba(2, 4, 3, 1) 100%); z-index: 250;">
        <div style="position: relative; width: 100px; height: 100px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center;">
            <div style="position: absolute; width: 70px; height: 70px; background: radial-gradient(circle, #ffd700 0%, transparent 70%); filter: blur(8px); animation: pulseTransition 1.5s infinite alternate;"></div>
            <span style="font-size: 3rem; position: relative; z-index: 10; filter: drop-shadow(0 0 10px #ffd700);">📜</span>
        </div>
        <h1 style="font-size: 26px; color: #ffdf70; margin-bottom: 12px; letter-spacing: 4px; text-shadow: 0 0 15px rgba(255,215,0,0.6);">任务完成</h1>
        <p style="font-size: 15px; color: #a3b899; letter-spacing: 2px;">历史档案整理中...</p>
    </div>

</div>

<script>
    /* ==========================================
       STORAGE FOUNDATION DRIVERS & GAME DATA
       ========================================== */
    const SESSION_KEY = 'sovereigns_relic_session';
    
    // 游戏数据 (5 Items & 5 Questions covering structural map coordinates nicely)
    // Declared at the absolute top of the script scope to avoid the Temporal Dead Zone (TDZ)
    const gameData = [
        { id: 'key', src: 'golden-key.png', x: 20, y: 85, q: "Apakah maksud Sovereignty dalam bahasa Inggeris?", opts: ["Negara berhak menentukan sempadan", "Negara bersatu menentang penceroboh", "Negara berkuasa penuh dalam pentadbiran", "Negara berjuang menuntut kemerdekaan"], ans: 2 },
        { id: 'coin', src: 'pirate-coin.png', x: 80, y: 55, q: "Apakah perundangan yang menjadi asas kepada sistem peraturan negara kita?", opts: ["Undang-undang adat", "Hukum Kanun Melaka", "Undang-undang syariah", "Perlembagaan Persekutuan"], ans: 3 },
        { id: 'lantern', src: 'lantern.png', x: 60, y: 35, q: "Dasar Pembangunan Ekonomi dibentuk selepas merdeka. Apakah matlamat yang hendak dicapai?", opts: ["Mentransformasikan ekonomi", "Meningkat taraf hidup rakyat", "Memantapkan peranan FELDA", "Memperkenalkan pertanian dagangan"], ans: 1 },
        { id: 'sword', src: 'curved-sword.png', x: 35, y: 18, q: "Yang manakah berkaitan dengan pengiktirafan PBB terhadap sesebuah negara?", opts: ["Kedaulatan tradisional", "Kedaulatan moden", "Kedaulatan undang-undang", "Kedaulatan antarabangsa"], ans: 3 },
        { id: 'chest', src: 'treasure-chest.png', x: 50, y: 6, q: "Tokoh X: 'Kedaulatan dibina berdasarkan prinsip kebebasan dan keadilan'. Siapakah X?", opts: ["Aristotle", "Jean Bodin", "Ibn Khaldun", "Tunku Abdul Rahman"], ans: 2 }
    ];

    let level1StartTime = 0;
    let level1CorrectCount = 0;

    function generateAttemptId() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const dateStr = `${yyyy}${mm}${dd}`;
                
        return `HIS-${dateStr}-${Date.now()}`;
    }

    function createDefaultSession() {
        return {
            attemptId: generateAttemptId(),
            date: new Date().toISOString(),
            completedStatus: false,
            googleSheetUploaded: false,
            level1Score: 0,
            level1Time: 0,
            transitScore: 0,
            transitTime: 0,
            level2Score: 0,
            level2Time: 0,
            totalTime: 0,
            q1_q5_answers: [
                { "questionId": "Q1", "answer": "" },
                { "questionId": "Q2", "answer": "" },
                { "questionId": "Q3", "answer": "" },
                { "questionId": "Q4", "answer": "" },
                { "questionId": "Q5", "answer": "" }
            ],
            learningType: '',
            name: '',
            phone: '',
            email: ''
        };
    }

    function initializeGameSession() {
        let session = localStorage.getItem(SESSION_KEY);
        if (!session) {
            session = createDefaultSession();
            localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        }
        return JSON.parse(session);
    }

    function saveGameSession(sessionData) {
        localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
    }

    function loadGameSession() {
        const session = localStorage.getItem(SESSION_KEY);
        return session ? JSON.parse(session) : initializeGameSession();
    }

    function resetGameSession() {
        const newSession = createDefaultSession();
        localStorage.setItem(SESSION_KEY, JSON.stringify(newSession));
        return newSession;
    }

    /* ==========================================
       AUDIO ENGINE PATCH (Web Audio API) 
       ========================================== */
    let audioCtx;
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // Generic Note Generator
    function playNote(freq, type, duration, vol, startTime) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, startTime);
        gain.gain.setValueAtTime(vol, startTime);
        gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + duration);
    }

    // 重塑高能海岛探险风格背景音乐
    function startBGM() {
        if(!audioCtx) return;

        // 海风音效
        const bufferSize = audioCtx.sampleRate * 2.0;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }
        const noiseSrc = audioCtx.createBufferSource();
        noiseSrc.buffer = noiseBuffer;
        noiseSrc.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(180, audioCtx.currentTime);

        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.frequency.setValueAtTime(0.08, audioCtx.currentTime);

    /* ==========================================
       QoL: RPG-STYLE TYPEWRITER MACHINE 
       ========================================== */
    let typewriterState = {
        element: null,
        lines: [],
        currentLineIdx: 0,
        currentCharIdx: 0,
        isTyping: false,
        isWaiting: false,
        onDone: null,
        typingTimeout: null,
        waitingTimeout: null,
        completedHTML: "" 
    };

    function runTypewriter(element, linesArray, lineIdx, onDone) {
        if (lineIdx === 0) {
            typewriterState.element = element;
            typewriterState.lines = linesArray;
            typewriterState.currentLineIdx = 0;
            typewriterState.completedHTML = "";
            typewriterState.onDone = onDone;
        }
        startTypingLine(lineIdx);
    }

    function startTypingLine(lineIdx) {
        if (lineIdx >= typewriterState.lines.length) {
            typewriterState.isTyping = false;
            typewriterState.isWaiting = false;
            if (typewriterState.onDone) typewriterState.onDone();
            return;
        }
        
        typewriterState.currentLineIdx = lineIdx;
        typewriterState.currentCharIdx = 0;
        typewriterState.isTyping = true;
        typewriterState.isWaiting = false;
        
        if (typewriterState.typingTimeout) clearTimeout(typewriterState.typingTimeout);
        if (typewriterState.waitingTimeout) clearTimeout(typewriterState.waitingTimeout);

        let curLine = typewriterState.lines[lineIdx];
        let prefix = (lineIdx > 0) ? "<br>" : "";
        
        function writeChar() {
            if (typewriterState.currentCharIdx < curLine.length) {
                typewriterState.element.innerHTML = typewriterState.completedHTML + prefix + curLine.substring(0, typewriterState.currentCharIdx + 1);
                typewriterState.currentCharIdx++;
                playTypewriterTick();

                typewriterState.element.scrollTop = typewriterState.element.scrollHeight;
                updateScrollIndicator(typewriterState.element);

                typewriterState.typingTimeout = setTimeout(writeChar, 80);
            } else {
                finishCurrentLine();
            }
        }
        writeChar();
    }

    function finishCurrentLine() {
        typewriterState.isTyping = false;
        typewriterState.isWaiting = true;
        
        if (typewriterState.typingTimeout) clearTimeout(typewriterState.typingTimeout);
        
        let curLine = typewriterState.lines[typewriterState.currentLineIdx];
        let prefix = (typewriterState.currentLineIdx > 0) ? "<br>" : "";
        
        typewriterState.element.innerHTML = typewriterState.completedHTML + prefix + curLine;
        typewriterState.completedHTML = typewriterState.element.innerHTML;
        
        typewriterState.element.scrollTop = typewriterState.element.scrollHeight;
        updateScrollIndicator(typewriterState.element);

        typewriterState.waitingTimeout = setTimeout(() => {
            typewriterState.isWaiting = false;
            startTypingLine(typewriterState.currentLineIdx + 1);
        }, 400);
    }

    function skipDialogue() {
        if (typewriterState.isTyping) {
            // Click during typing: immediately reveal the entire current line
            finishCurrentLine();
        } else if (typewriterState.isWaiting) {
            // Click during delay: skip the wait and proceed to next sentence immediately
            typewriterState.isWaiting = false;
            if (typewriterState.waitingTimeout) clearTimeout(typewriterState.waitingTimeout);
            startTypingLine(typewriterState.currentLineIdx + 1);
        }
    }

                this.reset();
            }
        }
        draw() {
            pCtx.save();
            pCtx.globalAlpha = this.alpha;
            pCtx.fillStyle = '#ffd700';
            pCtx.shadowBlur = 4;
            pCtx.shadowColor = '#ffd700';
            pCtx.beginPath();
            pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            pCtx.fill();
            pCtx.restore();
        }
    }
    for (let i = 0; i < 20; i++) {
        gameParticles.push(new GoldParticle());
    }
    function renderGoldParticles() {
        pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        gameParticles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(renderGoldParticles);
    }
    renderGoldParticles();

    // 在脚本加载时，立刻构建隐藏关卡世界，防止通关指南合拢后文物动态生成导致漏题
    buildGameWorld();
    loadGameSession();

    // 绑定对话框点击跳过事件
    const dialogueBox = document.getElementById('dialogue-box');
    if (dialogueBox) {
        dialogueBox.addEventListener('click', skipDialogue);
    }
</script>
</body>
</html>
